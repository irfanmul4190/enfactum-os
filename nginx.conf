# When adding a new app to the intranet, three places must update in lockstep:
#   1. This file                                     — add a `location /<app>/ { ... }` block.
#   2. ../Dockerfile                                 — add COPY into builder + COPY dist into nginx stage.
#   3. apps/launcher/src/lib/app-urls.ts             — add a card (status: "active").
#   4. apps/launcher/src/lib/employees.ts (APPS)     — for access-matrix admin UI.
#   5. apps/hr-hub/src/lib/access-matrix-apps.ts     — for new-employee default access seeding.
# Then ship a Supabase migration backfilling employee_app_access for the new app id.

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  absolute_redirect off;
  port_in_redirect off;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /market-grammer/ {
    try_files $uri $uri/ /market-grammer/index.html;
  }

  location /profit-navigator/ {
    try_files $uri $uri/ /profit-navigator/index.html;
  }

  location /enfactum-financing-hub/ {
    try_files $uri $uri/ /enfactum-financing-hub/index.html;
  }

  location /pipeline-pro/ {
    try_files $uri $uri/ /pipeline-pro/index.html;
  }

  location /hr-hub/ {
    try_files $uri $uri/ /hr-hub/index.html;
  }

  location /enfactum-mdf-central/ {
    try_files $uri $uri/ /enfactum-mdf-central/index.html;
  }

  location /enforge-contract-craft/ {
    try_files $uri $uri/ /enforge-contract-craft/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
