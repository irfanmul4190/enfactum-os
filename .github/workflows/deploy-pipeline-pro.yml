name: Deploy — Pipeline Pro
on:
  push:
    branches: [main]
    paths:
      - "apps/pipeline-pro/**"
      - "nginx.conf"
      - "Dockerfile"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Build and push container image
        run: |
          gcloud builds submit . \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/intranet-hub \
            --async
      - name: Wait for build to complete
        run: |
          sleep 30
          BUILD_ID=$(gcloud builds list --limit=1 --format="value(id)" --project=${{ secrets.GCP_PROJECT_ID }})
          echo "Latest build ID: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --project=${{ secrets.GCP_PROJECT_ID }} --format="value(status)")
            echo "Build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Build succeeded!"
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed!"
              exit 1
            fi
            sleep 15
          done
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy intranet-hub \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/intranet-hub \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10
